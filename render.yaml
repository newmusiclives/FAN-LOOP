services:
  - type: web
    name: fanloop
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run seed
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: BASE_URL
        fromService:
          type: web
          name: fanloop
          property: host
      - key: PORT
        value: 3000
      - key: ALLOWED_ORIGINS
        sync: false
      - key: MANIFEST_API_KEY
        sync: false
      - key: MANIFEST_ENV
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: ADMIN_INITIAL_PASSWORD
        sync: false
    disk:
      name: fanloop-data
      mountPath: /opt/render/project/src/db
      sizeGB: 1
