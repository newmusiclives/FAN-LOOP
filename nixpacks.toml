[phases.setup]
nixPkgs = ["nodejs_20", "npm", "python3", "gcc", "gnumake", "pkg-config"]

[phases.install]
cmds = ["cd backend && npm install"]

[phases.build]
cmds = ["cd backend && npm run seed"]

[start]
cmd = "cd backend && npm run seed && node db/reset-password.js admin@fanloop.io \"$ADMIN_INITIAL_PASSWORD\" && npm start"
